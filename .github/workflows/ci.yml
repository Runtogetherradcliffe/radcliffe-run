name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Non-blocking until the pre-existing lint debt (~57 errors, mostly
      # no-explicit-any) is cleared. Next 16 stopped linting during build,
      # so these accumulated ungated. Make this blocking once fixed.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Tests
        run: npm test
