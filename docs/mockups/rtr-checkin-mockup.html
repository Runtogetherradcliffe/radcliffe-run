<head>
<meta charset="UTF-8">

<title>RTR - Check-in and booking mockup</title>

<style>

  .page-header { text-align: center; margin-bottom: 28px; max-width: 520px; }

  .page-header h1 { font-size: 15px; font-weight: 500; color: #444; margin-bottom: 4px; }
  .page-header p { font-size: 13px; color: #888; line-height: 1.5; }
  .journey-tabs { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 360px; }
  .journey-tab { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1.5px solid #ddd; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; }

  .journey-tab.inactive { background: transparent; color: #888; border-color: #ddd; }
  .screen-context { max-width: 360px; width: 100%; margin-bottom: 12px; min-height: 42px; }
  .screen-context .who { font-size: 13px; font-weight: 500; color: #222; margin-bottom: 2px; }
  .screen-context .desc { font-size: 12px; color: #888; line-height: 1.4; }
  .phone-wrap { width: 100%; max-width: 360px; background: #0a0a0a; border-radius: 28px; border: 2px solid #2a2a2a; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }

  .phone-nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid #1e1e1e; background: #0a0a0a; flex-shrink: 0; }
  .nav-btn { background: #1e1e1e; border: none; color: #888; padding: 7px 16px; border-radius: 9px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; }
  .nav-btn.next-btn { background: #f5a623; color: #000; font-weight: 600; }
  .step-dots { display: flex; gap: 5px; align-items: center; }
  .rtr-nav { background: #111; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; }
  .rtr-badge { font-size: 10px; background: #1e1e1e; color: #f5a623; padding: 3px 9px; border-radius: 4px; font-weight: 500; }
  .rtr-btn { width: 100%; padding: 11px; background: #f5a623; color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .rtr-btn-ghost { width: 100%; padding: 10px; background: transparent; color: #f5a623; border: 1px solid #333; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .rtr-btn-run { flex: 1; padding: 14px 8px; background: #1e1e1e; color: #fff; border: 1px solid #2a2a2a; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; }

  .rtr-row:last-of-type { border-bottom: none; }
  .rtr-check { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .is-checked { background: #1a3a1a; color: #4caf76; }
  .is-booked { background: #0d1a2a; color: #5b9bd5; }
  .scroll-area { padding: 14px 16px; overflow-y: auto; flex: 1; }
  .run-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 4px; }
  .pill-road { background: #0d1a2a; color: #5b9bd5; }
  .pill-green { background: #1a3a1a; color: #4caf76; }

    body { background: #0a0a0a; padding: 0; justify-content: flex-start; }
    .page-header { display: none; }
    .journey-tabs { max-width: 100%; padding: 12px 16px 0; background: #0a0a0a; }

    .journey-tab.inactive { background: transparent; color: #555; border-color: #222; }

    .screen-context .who { color: #ccc; }
    .screen-context .desc { color: #555; }
    .phone-wrap { max-width: 100%; border-radius: 0; border: none; box-shadow: none; }
    .phone-nav-bar { border-top: 1px solid #1e1e1e; }
  }

</head>
<body>

<div class="page-header">
  <div class="logo">radcliffe.run</div>

  <p>Use the tabs to switch between the two approaches. Use Prev / Next to step through each user journey.</p>
</div>

<div class="screen-context" id="screen-context"></div>

    </button>
    <div class="step-dots" id="step-dots"></div>
    <button class="nav-btn next-btn" id="next-btn" onclick="nextStep()">
      Next <i class="ti ti-arrow-right" aria-hidden="true" style="font-size:13px;"></i>
    </button>
  </div>
</div>

function render() {
  const j = journeys[journey];
  const s = j.steps[step];
  document.getElementById('phone-content').innerHTML = s.html;
  document.getElementById('screen-context').innerHTML =
    '<p class="who">' + s.who + '</p><p class="desc">' + s.desc + '</p>';
  const dots = document.getElementById('step-dots');
  dots.innerHTML = j.steps.map(function(_, i) {
    return '<div style="width:' + (i === step ? 14 : 5) + 'px;height:5px;border-radius:3px;background:' + (i === step ? '#f5a623' : '#2a2a2a') + ';transition:width .2s;"></div>';
  }).join('');
  document.getElementById('prev-btn').style.opacity = step === 0 ? '0.3' : '1';
  document.getElementById('next-btn').style.opacity = step === j.steps.length - 1 ? '0.3' : '1';
  document.getElementById('tab1').className = 'journey-tab ' + (journey === 1 ? 'active' : 'inactive');
  document.getElementById('tab2').className = 'journey-tab ' + (journey === 2 ? 'active' : 'inactive');
}

function switchJourney(j) { journey = j; step = 0; render(); }
function nextStep() { if (step < journeys[journey].steps.length - 1) { step++; render(); } }
function prevStep() { if (step > 0) { step--; render(); } }
render();
</script>
